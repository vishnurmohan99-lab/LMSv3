services:
  - type: web
    name: duvex-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate --config=apps/api/prisma.config.ts && npm run build --workspace=apps/api
    startCommand: npx prisma migrate deploy --config=apps/api/prisma.config.ts && npm run start:prod --workspace=apps/api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production
